[package]
name = "rust-egui"
version = "0.1.0"
authors = ["Your Name"]
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
android-activity = "0.4"
egui = "0.22"
eframe = { version = "0.22", default-features = false, features = ["glow"] }

[package.metadata.android]
build_targets = ["aarch64-linux-android"]
min_sdk_version = 21
target_sdk_version = 30
